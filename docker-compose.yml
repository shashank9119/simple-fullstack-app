version: "3.8"

services:

  backend:
    build: ./HRM-Backend
    container_name: backend
    env_file:
      - ./HRM-Backend/.env
    networks:
      - app-network
    restart: always

  frontend:
    build: ./HRM-Frontend
    container_name: frontend
    networks:
      - app-network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend
      - backend
    networks:
      - app-network
    restart: always

networks:
  app-network:
    driver: bridge
